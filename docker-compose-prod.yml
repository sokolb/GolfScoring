version: "3"
services:
    frontend:
        image: briansokoloski/golffrontend:latest
        build:
            context: ./client-app
            args:
                - VITE_API_URL=${VITE_API_URL:-http://localhost:8082}
                - VITE_USERNAME=${VITE_USERNAME:-}
                - VITE_PASSWORD=${VITE_PASSWORD:-}
        ports:
            - "3001:3000"
        restart: always

    backend:
        image: briansokoloski/golfbackend:latest
        ports:
            - "8082:8082"
        volumes:
            - ${DATABASE_LOCATION}:/app/data
        restart: always
volumes:
    backend-data:
